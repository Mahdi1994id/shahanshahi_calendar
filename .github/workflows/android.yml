name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install pyside6
        pip install jdatetime
        pip install wget

    - name: Install Qt for Android SDK
      run: |
        pyside6-android-deploy init --input-file='shahanshahi andoid.py' --install-option accept-android-sdk-license --install-option accept-licenses
        # تلاش برای ساخت با تنظیمات پیش فرض
        pyside6-android-deploy build || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: App-Artifact
        path: |
          build/build/outputs/apk/debug/*.apk
          build/**/*.apk
        if-no-files-found: warn
