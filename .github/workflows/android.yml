name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install cython
        pip install pyside6
        pip install python-for-android

    - name: Build APK
      run: |
        p4a apk --name "Shahanshahi" \
               --package "org.myapp.calendar" \
               --version "1.0" \
               --arch "arm64-v8a" \
               --private . \
               --orientation "portrait"
