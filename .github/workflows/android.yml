name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        pip install pyside6
        pip install jinja2 pkginfo tqdm packaging==24.1
        pip install jdatetime

    - name: Build APK
      run: |
        # پیدا کردن فایل‌های wheel با دستور find
        WHEEL_PYSIDE=$(find /opt/hostedtoolcache -name "PySide6-*.whl" | head -n 1)
        WHEEL_SHIBOKEN=$(find /opt/hostedtoolcache -name "shiboken6-*.whl" | head -n 1)
        
        echo "Pyside: $WHEEL_PYSIDE"
        echo "Shiboken: $WHEEL_SHIBOKEN"

        # اجرای اسکریپت
        python -m PySide6.scripts.android_deploy init --input-file='shahanshahi andoid.py' --wheel-pyside="$WHEEL_PYSIDE" --wheel-shiboken="$WHEEL_SHIBOKEN" --install-option accept-android-sdk-license --install-option accept-licenses
        
        python -m PySide6.scripts.android_deploy build

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: App-Artifact
        path: |
          build/build/outputs/apk/debug/*.apk
