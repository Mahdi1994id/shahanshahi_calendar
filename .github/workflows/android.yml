name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PySide6
      run: |
        pip install pyside6
        pip install jdatetime

    - name: Run PySide6 Deploy (Try 1)
      run: |
        pyside6-android-deploy init --input-file='shahanshahi andoid.py' || true
        
    - name: Check if init worked
      run: ls -R
